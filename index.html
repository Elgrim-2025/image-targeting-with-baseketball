<div id="sound-prompt">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
  화면을 터치하면 소리가 켜집니다
</div>
<script>
(function(){
  var el = document.getElementById('sound-prompt');
  var unlocked = false;
  function unlock(){
    if(unlocked) return;
    unlocked = true;
    // 재생 중인 모든 video 소리 켜기
    document.querySelectorAll('video').forEach(function(v){ v.muted = false; v.play && v.play().catch(function(){}); });
    el.style.opacity = '0';
    setTimeout(function(){ el.style.display = 'none'; }, 400);
  }
  document.addEventListener('touchstart', unlock, {once: true});
  document.addEventListener('click',      unlock, {once: true});
})();
</script>
